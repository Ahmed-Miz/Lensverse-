<main>
  <section class="hero-section">
    <div class="container">
      <div class="d-flex justify-content-end align-items-center mt-5 me-4">
        <div
          class="border-orang-1 rounded-5 d-flex justify-content-center align-items-center px-3 py-1 bg-lans"
        >
          <span class="mb-1 fs-12 text-orang">مميز</span>
          <span class="w-h-6 rounded-5 ms-2"></span>
          <span class="w-h-6 rounded-5 ms-1"></span>
        </div>
      </div>
      <h2 class="h1 fs-60 mt-4 text-white d-flex justify-content-end">مقالات مختارة</h2>
      <p class="fs-18 text-white-50 d-flex justify-content-end">محتوى منتقى لبدء رحلة تعلمك</p>
      <button class="bg-orang fw-medium text-white px-3 py-2 border-0 rounded-5" routerLink="/blog">
        <i class="fa-solid fa-chevron-left"></i> عرض الكل
      </button>
      @for (post of posts; track $index) {
        <div
          class="card mb-3 mt-5 overflow-hidden position-relative bg-card text-white rounded-5"
          style="height: 350px"
          [routerLink]="['/article-details', post.id]"
        >
          <div class="d-flex bg-info">
            <div class="border-orang-1 rounded-4 px-2 bg-lans position-absolute end-42 top-10">
              <span class="fs-12 text-orang">{{ post.category }}</span>
            </div>
            <p class="card-text text-end position-absolute end-30 top-10 text-white-50">
              <small>{{ post.readTime }} <i class="fa-regular fa-clock"></i></small>
            </p>
          </div>

          <div class="row g-0">
            <div class="col-md-6 bg-card z-1">
              <div class="card-body">
                <h3 class="card-title text-end mt-5 mb-3">{{ post.title }}</h3>
                <p class="card-text text-end text-white-50">
                  {{ post.excerpt }}
                </p>
              </div>
            </div>

            <div class="col-md-6 position-relative" style="height: 350px">
              <img [src]="post.image" class="img-fluid h-100" alt="..." />
            </div>
          </div>
          <div class="bg-orang position-absolute end-10 fs-12 top-10 px-2 py-1 fw-bold rounded-5">
            <span>مميز <i class="fa-solid fa-star fs-8"></i></span>
          </div>
          <div class="d-flex z-1">
            <div class="d-flex position-absolute bottom-10 end-37">
              <div class="text-center fs-12">
                <p class="mb-0">{{ post.author.name }}</p>
                <span class="text-white-50">{{ post.date }}</span>
              </div>
              <div
                class="w-h-30 overflow-hidden ms-2 border border-2 border-dark position-relative"
              >
                <img [src]="post.author.avatar" class="w-100" alt="" />
              </div>
              <div class="w-h-12 position-absolute bottom-0 end-10"></div>
            </div>
            <div class="position-absolute bottom-10 start-50px text-orang">
              <i class="fa-solid fa-arrow-left fs-12"></i>
              <button class="bg-transparent border-0 fs-12 text-orang">اقرأ المقال</button>
            </div>
          </div>
        </div>
      }
    </div>
  </section>
</main>
